name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-flight runs when a new commit lands on the same branch.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ts-typecheck-lint-test:
    name: TS · ${{ matrix.os }} · Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ['20', '22']

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Typecheck (all packages)
        run: pnpm -r typecheck

      - name: Lint (Biome)
        run: pnpm lint

      - name: Run tests (all packages)
        run: pnpm -r test
        env:
          CI: 'true'

  daml-build:
    name: DAML · build canton-vc-credential DAR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache DAML SDK
        uses: actions/cache@v4
        with:
          path: ~/.daml
          key: daml-${{ runner.os }}-3.4.11

      - name: Install DAML SDK 3.4.11
        run: |
          if [ ! -x "$HOME/.daml/bin/daml" ]; then
            curl -sSL https://get.daml.com | sh -s 3.4.11
          fi
          echo "$HOME/.daml/bin" >> $GITHUB_PATH

      - name: Build DAR
        working-directory: daml/canton-vc-credential
        run: ./build.sh

      - name: Verify DAR artifact
        working-directory: daml/canton-vc-credential
        run: |
          ls -la release/
          test -f release/canton-vc-credential-2.2.0.dar

      - name: Note any drift between committed DAR and fresh build
        working-directory: daml/canton-vc-credential
        run: |
          # DAML LF bytecode is deterministic (the on-chain package id
          # derives from a canonical hash of the LF AST and is identical
          # across platforms), but the ZIP envelope wrapped around it by
          # `daml build` can drift by a few bytes between local + CI
          # runners (file-ordering, embedded build metadata). The
          # on-chain package id and the contract behaviour are unchanged
          # by this drift.
          #
          # We surface the drift as a warning so reviewers see when the
          # committed envelope bytes diverge from a fresh CI build,
          # without failing the matrix on a non-semantic difference.
          if ! git diff --quiet --exit-code release/; then
            echo "::warning::release/ DAR envelope bytes differ from a fresh CI build. The LF package id is deterministic and unchanged; this is ZIP-metadata drift only."
            git diff --stat release/
          else
            echo "Committed DAR is byte-for-byte identical to the fresh build."
          fi

      - name: Upload DAR
        uses: actions/upload-artifact@v4
        with:
          name: canton-vc-credential-${{ github.sha }}.dar
          path: daml/canton-vc-credential/release/canton-vc-credential-2.2.0.dar
          retention-days: 30

  audit:
    name: Audit · dependency review + secrets scan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

      - name: Detect secrets in diff
        run: |
          # Scan diff for accidentally-committed PAT / API keys / SSH refs.
          if git diff origin/${{ github.base_ref }}...HEAD | \
              grep -E '(github_pat_[A-Za-z0-9_]{20,}|sk-[A-Za-z0-9]{20,}|aws_secret_access_key|BEGIN [A-Z]+ PRIVATE KEY)'; then
            echo "::error::Potential secret detected in diff"
            exit 1
          fi

  required:
    name: Required checks passed
    needs: [ts-typecheck-lint-test, daml-build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Confirm all required jobs succeeded
        run: |
          if [ "${{ needs.ts-typecheck-lint-test.result }}" != "success" ]; then
            echo "TS pipeline failed"; exit 1
          fi
          if [ "${{ needs.daml-build.result }}" != "success" ]; then
            echo "DAML build failed"; exit 1
          fi
          echo "All required checks passed."
